<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Startup Ideas Explorer — 425 Ideas from 4 Podcasts</title>
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
:root { --bg: #0a0a0f; --bg2: #12121a; --bg3: #1a1a24; --fg: #e0e0e8; --fg2: #888894; --accent: #f0a030; }
body { background: var(--bg); color: var(--fg); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif; }
#app { max-width: 1400px; margin: 0 auto; padding: 24px 20px 100px; }

.header { margin-bottom: 24px; }
.header h1 { font-size: 28px; font-weight: 700; letter-spacing: -0.02em; margin-bottom: 6px; }
.header .sub { font-size: 14px; color: var(--fg2); line-height: 1.5; }
.header .sub b { color: var(--fg); }

.stats-bar { display: flex; flex-wrap: wrap; gap: 16px 28px; margin-bottom: 20px; }
.stat { display: flex; flex-direction: column; gap: 2px; }
.stat .val { font-size: 28px; font-weight: 700; letter-spacing: -0.03em; color: var(--accent); }
.stat .lbl { font-size: 10px; text-transform: uppercase; letter-spacing: 0.1em; color: var(--fg2); }

.filters { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 20px; align-items: center; }
.filter-group { display: flex; flex-direction: column; gap: 4px; }
.filter-group label { font-size: 10px; text-transform: uppercase; letter-spacing: 0.1em; color: var(--fg2); }
.filter-group select, .filter-group input {
  background: var(--bg2); color: var(--fg); border: 1px solid rgba(255,255,255,0.1);
  border-radius: 6px; padding: 7px 12px; font-size: 13px; font-family: inherit; min-width: 140px;
}
.filter-group select:focus, .filter-group input:focus { outline: none; border-color: var(--accent); }
.reset-btn {
  padding: 7px 16px; font-size: 12px; border-radius: 6px; border: 1px solid rgba(255,255,255,0.1);
  background: transparent; color: var(--fg2); cursor: pointer; margin-left: auto; align-self: flex-end;
}
.reset-btn:hover { color: var(--fg); border-color: var(--fg2); }

.cat-chart { display: flex; gap: 3px; align-items: flex-end; height: 40px; margin-bottom: 20px; }
.cat-bar { flex: 1; border-radius: 2px 2px 0 0; min-width: 20px; cursor: pointer; transition: opacity 0.15s; position: relative; }
.cat-bar:hover { opacity: 0.8; }
.cat-bar .cat-tip { position: absolute; bottom: 100%; left: 50%; transform: translateX(-50%); background: var(--bg3); padding: 3px 8px; border-radius: 4px; font-size: 10px; white-space: nowrap; pointer-events: none; opacity: 0; transition: opacity 0.15s; }
.cat-bar:hover .cat-tip { opacity: 1; }
.cat-labels { display: flex; gap: 3px; margin-bottom: 16px; }
.cat-labels span { flex: 1; text-align: center; font-size: 9px; color: var(--fg2); min-width: 20px; overflow: hidden; text-overflow: ellipsis; }

.ideas-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 12px; }
.idea-card {
  background: var(--bg2); border: 1px solid rgba(255,255,255,0.04); border-radius: 10px;
  padding: 16px; cursor: pointer; transition: all 0.15s;
}
.idea-card:hover { border-color: rgba(255,255,255,0.12); transform: translateY(-1px); }
.idea-card .ic-top { display: flex; justify-content: space-between; align-items: flex-start; gap: 8px; margin-bottom: 8px; }
.idea-card .ic-title { font-size: 15px; font-weight: 600; line-height: 1.3; }
.idea-card .ic-cat { font-size: 10px; font-weight: 600; padding: 2px 8px; border-radius: 10px; white-space: nowrap; flex-shrink: 0; }
.idea-card .ic-desc { font-size: 12px; color: var(--fg2); line-height: 1.5; margin-bottom: 10px; }
.idea-card .ic-meta { display: flex; flex-wrap: wrap; gap: 6px; font-size: 10px; }
.ic-tag { padding: 2px 8px; border-radius: 4px; background: rgba(255,255,255,0.04); color: var(--fg2); }
.idea-card .ic-episode { font-size: 10px; color: var(--fg2); margin-top: 8px; border-top: 1px solid rgba(255,255,255,0.04); padding-top: 8px; }
.idea-card .ic-episode b { color: var(--fg); font-weight: 500; }
.results-count { font-size: 12px; color: var(--fg2); margin-bottom: 12px; }
.no-results { text-align: center; padding: 60px 20px; color: var(--fg2); font-size: 15px; }

.cat-saas { background: rgba(99,132,255,0.15); color: #7799ff; border-color: rgba(99,132,255,0.3); }
.cat-tool { background: rgba(80,200,120,0.15); color: #50c878; border-color: rgba(80,200,120,0.3); }
.cat-agency { background: rgba(255,165,0,0.15); color: #ffa500; border-color: rgba(255,165,0,0.3); }
.cat-content { background: rgba(220,80,220,0.15); color: #dc50dc; border-color: rgba(220,80,220,0.3); }
.cat-marketplace { background: rgba(255,99,71,0.15); color: #ff6347; border-color: rgba(255,99,71,0.3); }
.cat-e-commerce { background: rgba(0,206,209,0.15); color: #00ced1; border-color: rgba(0,206,209,0.3); }
.cat-community { background: rgba(255,215,0,0.15); color: #ffd700; border-color: rgba(255,215,0,0.3); }
.cat-other { background: rgba(180,180,180,0.15); color: #aaa; border-color: rgba(180,180,180,0.3); }
.bar-saas { background: #6384ff; } .bar-tool { background: #50c878; }
.bar-agency { background: #ffa500; } .bar-content { background: #dc50dc; }
.bar-marketplace { background: #ff6347; } .bar-e-commerce { background: #00ced1; }
.bar-community { background: #ffd700; } .bar-other { background: #aaa; }

/* Modal */
.modal-overlay {
  display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
  background: rgba(0,0,0,0.75); z-index: 1000; backdrop-filter: blur(4px);
  justify-content: center; align-items: flex-start; padding: 40px 20px; overflow-y: auto;
}
.modal-overlay.open { display: flex; }
.modal {
  background: var(--bg2); border: 1px solid rgba(255,255,255,0.08); border-radius: 14px;
  max-width: 780px; width: 100%; padding: 0; position: relative; animation: modalIn 0.2s ease;
}
@keyframes modalIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
.modal-close {
  position: absolute; top: 16px; right: 16px; background: rgba(255,255,255,0.06);
  border: none; color: var(--fg2); width: 32px; height: 32px; border-radius: 8px;
  cursor: pointer; font-size: 18px; display: flex; align-items: center; justify-content: center; z-index: 2;
}
.modal-close:hover { background: rgba(255,255,255,0.12); color: var(--fg); }

/* Modal header */
.modal-header {
  padding: 28px 32px 20px; border-bottom: 1px solid rgba(255,255,255,0.06);
}
.modal-header .mh-podcast { font-size: 10px; text-transform: uppercase; letter-spacing: 0.1em; color: var(--accent); margin-bottom: 6px; }
.modal-header .mh-title { font-size: 22px; font-weight: 700; line-height: 1.3; margin-bottom: 6px; }
.modal-header .mh-meta { font-size: 12px; color: var(--fg2); }
.modal-header .mh-meta b { color: var(--fg); font-weight: 500; }

/* Modal body */
.modal-body { padding: 24px 32px 32px; }

/* Idea highlight */
.modal-idea-box {
  background: rgba(240,160,48,0.06); border: 1px solid rgba(240,160,48,0.15);
  border-radius: 10px; padding: 16px; margin-bottom: 24px;
}
.modal-idea-box .mib-label { font-size: 10px; text-transform: uppercase; letter-spacing: 0.1em; color: var(--accent); margin-bottom: 6px; }
.modal-idea-box .mib-title { font-size: 16px; font-weight: 600; margin-bottom: 4px; }
.modal-idea-box .mib-desc { font-size: 13px; color: var(--fg2); line-height: 1.5; }
.modal-idea-box .mib-tags { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 10px; }

/* Executive summary */
.modal-section { margin-bottom: 24px; }
.modal-section .ms-label { font-size: 11px; text-transform: uppercase; letter-spacing: 0.08em; color: var(--accent); font-weight: 600; margin-bottom: 10px; }
.modal-section .ms-text { font-size: 14px; line-height: 1.7; color: var(--fg); }

/* Takeaways */
.takeaway-list { list-style: none; }
.takeaway-list li {
  padding: 10px 14px; font-size: 13px; line-height: 1.5; color: var(--fg);
  background: rgba(255,255,255,0.02); border-radius: 8px; margin-bottom: 6px;
  border-left: 3px solid var(--accent);
}

/* Opportunities */
.opp-list { list-style: none; }
.opp-list li {
  padding: 10px 14px; font-size: 13px; line-height: 1.5; color: var(--fg);
  background: rgba(80,200,120,0.04); border-radius: 8px; margin-bottom: 6px;
  border-left: 3px solid #50c878;
}

/* Quote */
.quote-box {
  background: rgba(255,255,255,0.02); border-left: 3px solid var(--fg2);
  padding: 14px 18px; border-radius: 0 8px 8px 0; font-style: italic;
  font-size: 14px; line-height: 1.6; color: var(--fg2);
}

/* Tags */
.modal-tags { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 16px; }
.modal-tag {
  padding: 4px 12px; border-radius: 20px; font-size: 11px; font-weight: 500;
  background: rgba(255,255,255,0.04); color: var(--fg2); border: 1px solid rgba(255,255,255,0.06);
}

/* Other ideas from same episode */
.related-ideas { margin-top: 24px; padding-top: 20px; border-top: 1px solid rgba(255,255,255,0.06); }
.related-ideas .ri-label { font-size: 11px; text-transform: uppercase; letter-spacing: 0.08em; color: var(--fg2); margin-bottom: 10px; }
.ri-card {
  display: flex; align-items: center; gap: 10px; padding: 10px 14px;
  background: rgba(255,255,255,0.02); border-radius: 8px; margin-bottom: 6px; cursor: pointer;
}
.ri-card:hover { background: rgba(255,255,255,0.05); }
.ri-card .ri-title { font-size: 13px; font-weight: 500; flex: 1; }
.ri-card .ri-cat { font-size: 10px; padding: 2px 8px; border-radius: 10px; }

/* Effort/Investment bars */
.score-bars { display: flex; gap: 16px; margin: 16px 0; }
.score-bar { flex: 1; }
.score-bar .sb-label { font-size: 10px; color: var(--fg2); margin-bottom: 4px; text-transform: uppercase; letter-spacing: 0.05em; }
.score-bar .sb-track { height: 6px; background: rgba(255,255,255,0.06); border-radius: 3px; overflow: hidden; }
.score-bar .sb-fill { height: 100%; border-radius: 3px; transition: width 0.3s ease; }
.sb-fill.effort-low { width: 33%; background: #50c878; }
.sb-fill.effort-medium { width: 66%; background: var(--accent); }
.sb-fill.effort-high { width: 100%; background: #ff6347; }
.sb-fill.invest-bootstrap { width: 15%; background: #50c878; }
.sb-fill.invest-low { width: 35%; background: #6384ff; }
.sb-fill.invest-medium { width: 65%; background: var(--accent); }
.sb-fill.invest-high { width: 100%; background: #ff6347; }

@media (max-width: 640px) {
  .ideas-grid { grid-template-columns: 1fr; }
  .header h1 { font-size: 22px; }
  .modal-header, .modal-body { padding-left: 20px; padding-right: 20px; }
  .modal-header .mh-title { font-size: 18px; }
}
</style>
</head>
<body>
<div id="app">
  <div class="header">
    <h1>Startup Ideas Explorer</h1>
    <div class="sub">
      <b id="totalCount">425</b> business ideas extracted from <b>400+ episodes</b> across
      <b>4 podcasts</b>: The Startup Ideas Podcast, No Priors, The Cognitive Revolution &amp; Latent Space.
      Spanning <b>Nov 2021 — Mar 2026</b>. Click any idea for the full executive briefing.
    </div>
  </div>

  <div class="stats-bar" id="statsBar"></div>
  <div class="cat-chart" id="catChart"></div>
  <div class="cat-labels" id="catLabels"></div>

  <div class="filters">
    <div class="filter-group">
      <label>Search</label>
      <input type="text" id="searchInput" placeholder="AI, newsletter, fintech...">
    </div>
    <div class="filter-group">
      <label>Category</label>
      <select id="catFilter"><option value="">All categories</option></select>
    </div>
    <div class="filter-group">
      <label>Effort</label>
      <select id="effortFilter">
        <option value="">All efforts</option>
        <option value="low">Low</option><option value="medium">Medium</option><option value="high">High</option>
      </select>
    </div>
    <div class="filter-group">
      <label>Investment</label>
      <select id="investFilter">
        <option value="">All investments</option>
        <option value="bootstrap">Bootstrap (&lt;$1K)</option><option value="low">Low ($1-10K)</option>
        <option value="medium">Medium ($10-50K)</option><option value="high">High ($50K+)</option>
      </select>
    </div>
    <div class="filter-group">
      <label>Podcast</label>
      <select id="podcastFilter">
        <option value="">All podcasts</option>
        <option value="The Startup Ideas Podcast">Startup Ideas</option>
        <option value="No Priors">No Priors</option>
        <option value="The Cognitive Revolution">Cognitive Revolution</option>
        <option value="Latent Space">Latent Space</option>
      </select>
    </div>
    <div class="filter-group">
      <label>Period</label>
      <select id="yearFilter">
        <option value="">All years</option>
        <option value="2026">2026</option><option value="2025">2025</option><option value="2024">2024</option>
        <option value="2023">2023</option><option value="2022">2022</option><option value="2021">2021</option>
      </select>
    </div>
    <button class="reset-btn" id="resetBtn">Reset</button>
  </div>

  <div class="results-count" id="resultsCount"></div>
  <div class="ideas-grid" id="ideasGrid"></div>
  <div class="no-results" id="noResults" style="display:none">No ideas match your filters.</div>
</div>

<!-- Modal -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal" id="modal"></div>
</div>

<script>
let data = [];
let filtered = [];
let summaries = {};

const CAT_COLORS = {
  'SaaS': 'saas', 'Tool': 'tool', 'Agency': 'agency', 'Content': 'content',
  'Marketplace': 'marketplace', 'E-commerce': 'e-commerce', 'Community': 'community', 'Other': 'other'
};
const CAT_ORDER = ['SaaS','Content','Agency','Tool','E-commerce','Community','Marketplace','Other'];
const INVEST_LABELS = { 'bootstrap': 'Bootstrap <$1K', 'low': '$1-10K', 'medium': '$10-50K', 'high': '$50K+' };

function applyFilters() {
  const search = document.getElementById('searchInput').value.toLowerCase();
  const cat = document.getElementById('catFilter').value;
  const effort = document.getElementById('effortFilter').value;
  const invest = document.getElementById('investFilter').value;
  const year = document.getElementById('yearFilter').value;
  const podcast = document.getElementById('podcastFilter').value;

  filtered = data.filter(d => {
    if (cat && d.category !== cat) return false;
    if (effort && d.effort !== effort) return false;
    if (invest && d.investment !== invest) return false;
    if (year && !d.episode_date.startsWith(year)) return false;
    if (podcast && d.podcast !== podcast) return false;
    if (search) {
      const hay = [d.idea, d.description, d.target_market, d.episode_title, d.mentioned_by, d.category].join(' ').toLowerCase();
      if (!hay.includes(search)) return false;
    }
    return true;
  });
  renderIdeas(); renderStats(); renderCatChart();
}

function renderStats() {
  const cats = {};
  filtered.forEach(d => { cats[d.category] = (cats[d.category]||0)+1; });
  const topCat = Object.entries(cats).sort((a,b)=>b[1]-a[1])[0];
  const lowEff = filtered.filter(d=>d.effort==='low').length;
  const bootstrap = filtered.filter(d=>d.investment==='bootstrap').length;
  const recent = filtered.filter(d=>d.episode_date>='2025-01-01').length;
  document.getElementById('statsBar').innerHTML = `
    <div class="stat"><div class="val">${filtered.length}</div><div class="lbl">Ideas shown</div></div>
    <div class="stat"><div class="val">${topCat ? topCat[0] : '-'}</div><div class="lbl">Top category (${topCat ? topCat[1] : 0})</div></div>
    <div class="stat"><div class="val">${lowEff}</div><div class="lbl">Low effort</div></div>
    <div class="stat"><div class="val">${bootstrap}</div><div class="lbl">Bootstrap</div></div>
    <div class="stat"><div class="val">${recent}</div><div class="lbl">Since 2025</div></div>`;
}

function renderCatChart() {
  const cats = {};
  CAT_ORDER.forEach(c => cats[c] = 0);
  filtered.forEach(d => { cats[d.category] = (cats[d.category]||0)+1; });
  const max = Math.max(...Object.values(cats), 1);
  document.getElementById('catChart').innerHTML = CAT_ORDER.map(c =>
    `<div class="cat-bar bar-${CAT_COLORS[c]}" style="height:${Math.max(3, cats[c]/max*100)}%"><div class="cat-tip">${c}: ${cats[c]}</div></div>`
  ).join('');
  document.getElementById('catLabels').innerHTML = CAT_ORDER.map(c => `<span>${c}</span>`).join('');
}

function renderIdeas() {
  const grid = document.getElementById('ideasGrid');
  const noRes = document.getElementById('noResults');
  document.getElementById('resultsCount').textContent = `${filtered.length} ideas found`;
  if (filtered.length === 0) { grid.innerHTML = ''; noRes.style.display = 'block'; return; }
  noRes.style.display = 'none';

  grid.innerHTML = filtered.map((d, i) => `
    <div class="idea-card" onclick="openModal(${filtered.indexOf(d)})">
      <div class="ic-top">
        <div class="ic-title">${esc(d.idea)}</div>
        <span class="ic-cat cat-${CAT_COLORS[d.category] || 'other'}">${esc(d.category)}</span>
      </div>
      <div class="ic-desc">${esc(d.description)}</div>
      <div class="ic-meta">
        <span class="ic-tag">${d.effort} effort</span>
        <span class="ic-tag">${INVEST_LABELS[d.investment] || d.investment}</span>
        <span class="ic-tag">${esc(d.revenue_model)}</span>
        ${d.target_market ? `<span class="ic-tag">${esc(d.target_market.substring(0,50))}</span>` : ''}
      </div>
      <div class="ic-episode">
        <b>${esc(d.episode_date)}</b> &mdash; ${esc(d.episode_title)}
        ${d.mentioned_by ? ` &mdash; <b>${esc(d.mentioned_by)}</b>` : ''}
        ${d.podcast && d.podcast !== 'The Startup Ideas Podcast' ? ` &mdash; <i>${esc(d.podcast)}</i>` : ''}
      </div>
    </div>
  `).join('');
}

function openModal(idx) {
  const d = filtered[idx];
  const epKey = d.episode_date + ' - ' + d.episode_title;

  // Try multiple key formats to find the summary
  let summary = summaries[epKey];
  if (!summary) {
    for (const k of Object.keys(summaries)) {
      if (k.includes(d.episode_title) || (d.episode_date && k.startsWith(d.episode_date))) {
        summary = summaries[k]; break;
      }
    }
  }

  // Find other ideas from same episode
  const relatedIdeas = data.filter(x => x.episode_title === d.episode_title && x.episode_date === d.episode_date && x.idea !== d.idea);

  const modal = document.getElementById('modal');
  modal.innerHTML = `
    <button class="modal-close" onclick="closeModal()">&times;</button>

    <div class="modal-header">
      <div class="mh-podcast">${esc(d.podcast || 'The Startup Ideas Podcast')}</div>
      <div class="mh-title">${esc(d.episode_title)}</div>
      <div class="mh-meta"><b>${esc(d.episode_date)}</b>${d.mentioned_by ? ` &mdash; Guest: <b>${esc(d.mentioned_by)}</b>` : ''}</div>
    </div>

    <div class="modal-body">
      <!-- Selected idea highlight -->
      <div class="modal-idea-box">
        <div class="mib-label">Selected idea</div>
        <div class="mib-title">${esc(d.idea)}</div>
        <div class="mib-desc">${esc(d.description)}</div>
        <div class="score-bars">
          <div class="score-bar">
            <div class="sb-label">Effort: ${d.effort}</div>
            <div class="sb-track"><div class="sb-fill effort-${d.effort}"></div></div>
          </div>
          <div class="score-bar">
            <div class="sb-label">Investment: ${INVEST_LABELS[d.investment] || d.investment}</div>
            <div class="sb-track"><div class="sb-fill invest-${d.investment}"></div></div>
          </div>
        </div>
        <div class="mib-tags">
          <span class="ic-tag cat-${CAT_COLORS[d.category] || 'other'}">${esc(d.category)}</span>
          <span class="ic-tag">${esc(d.revenue_model)}</span>
          ${d.target_market ? `<span class="ic-tag">${esc(d.target_market)}</span>` : ''}
        </div>
      </div>

      ${summary ? `
        <!-- Executive Summary -->
        <div class="modal-section">
          <div class="ms-label">Executive Summary</div>
          <div class="ms-text">${esc(summary.executive_summary)}</div>
        </div>

        <!-- Key Takeaways -->
        ${summary.key_takeaways && summary.key_takeaways.length ? `
        <div class="modal-section">
          <div class="ms-label">Key Takeaways</div>
          <ul class="takeaway-list">
            ${summary.key_takeaways.map(t => `<li>${esc(t)}</li>`).join('')}
          </ul>
        </div>` : ''}

        <!-- Opportunities -->
        ${summary.opportunities && summary.opportunities.length ? `
        <div class="modal-section">
          <div class="ms-label">Opportunities</div>
          <ul class="opp-list">
            ${summary.opportunities.map(o => `<li>${esc(o)}</li>`).join('')}
          </ul>
        </div>` : ''}

        <!-- Quote -->
        ${summary.quotes && summary.quotes.length && summary.quotes[0] ? `
        <div class="modal-section">
          <div class="ms-label">Notable Quote</div>
          <div class="quote-box">"${esc(summary.quotes[0])}"</div>
        </div>` : ''}

        <!-- Tags -->
        ${summary.tags && summary.tags.length ? `
        <div class="modal-tags">
          ${summary.tags.map(t => `<span class="modal-tag">${esc(t)}</span>`).join('')}
        </div>` : ''}
      ` : `
        <div class="modal-section">
          <div class="ms-label">Executive Summary</div>
          <div class="ms-text" style="color:var(--fg2)">No executive summary available for this episode.</div>
        </div>
      `}

      <!-- Related ideas from same episode -->
      ${relatedIdeas.length ? `
      <div class="related-ideas">
        <div class="ri-label">Other ideas from this episode (${relatedIdeas.length})</div>
        ${relatedIdeas.map(r => `
          <div class="ri-card" onclick="openModalByIdea('${esc(r.idea).replace(/'/g,"\\'")}')">
            <div class="ri-title">${esc(r.idea)}</div>
            <span class="ri-cat cat-${CAT_COLORS[r.category] || 'other'}">${esc(r.category)}</span>
          </div>
        `).join('')}
      </div>` : ''}
    </div>
  `;

  document.getElementById('modalOverlay').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function openModalByIdea(ideaName) {
  const idx = filtered.findIndex(d => d.idea === ideaName);
  if (idx >= 0) openModal(idx);
  else {
    const allIdx = data.findIndex(d => d.idea === ideaName);
    if (allIdx >= 0) {
      filtered.push(data[allIdx]);
      openModal(filtered.length - 1);
    }
  }
}

function closeModal() {
  document.getElementById('modalOverlay').classList.remove('open');
  document.body.style.overflow = '';
}

document.getElementById('modalOverlay').addEventListener('click', e => {
  if (e.target === e.currentTarget) closeModal();
});
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

function esc(s) {
  if (!s) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function populateCatFilter() {
  const sel = document.getElementById('catFilter');
  CAT_ORDER.forEach(c => {
    const count = data.filter(d=>d.category===c).length;
    if (count > 0) { const o = document.createElement('option'); o.value = c; o.textContent = `${c} (${count})`; sel.appendChild(o); }
  });
}

// Events
['searchInput'].forEach(id => document.getElementById(id).addEventListener('input', applyFilters));
['catFilter','effortFilter','investFilter','yearFilter','podcastFilter'].forEach(id =>
  document.getElementById(id).addEventListener('change', applyFilters));
document.getElementById('resetBtn').addEventListener('click', () => {
  ['searchInput','catFilter','effortFilter','investFilter','yearFilter','podcastFilter'].forEach(id =>
    document.getElementById(id).value = '');
  applyFilters();
});

// Load data + summaries in parallel
Promise.all([
  fetch('all_ideas.json?v=' + Date.now()).then(r => r.json()),
  fetch('episode_summaries.json?v=' + Date.now()).then(r => r.json()).catch(() => ({}))
]).then(([ideas, sums]) => {
  data = ideas;
  filtered = ideas;
  summaries = sums;
  document.getElementById('totalCount').textContent = ideas.length;
  populateCatFilter();
  applyFilters();
});
</script>
